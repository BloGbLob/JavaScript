        <!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Seliak Z40_JS</title>
</head>
<body>
<h2>Kalkulator - Pavlo Seliak</h2>
Podaj pierwszą liczbę:
<input type="text" id="a"><br><br>
Podaj drugą liczbę:
<input type="text" id="b"><br><br>
<button onclick="suma_sel()">Dodawanie</button>
<button onclick="roznica_sel()">Odejmowanie</button>
<button onclick="iloczyn_sel()">Mnożenie</button>
<button onclick="iloraz_sel()">Dzielenie</button>
<p id="wynik"></p>
<script>
function sprawdz_dane(){
    var a = document.getElementById("a").value;
    var b = document.getElementById("b").value;
    if(a == "" || b == ""){
        document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
        return false;
    }
    return true;
}
function suma_sel(){
    if(!sprawdz_dane()) return;

    var a = parseFloat(document.getElementById("a").value);
    var b = parseFloat(document.getElementById("b").value);

    var wynik = a + b;
    document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
}
function roznica_sel(){
    if(!sprawdz_dane()) return;

    var a = parseFloat(document.getElementById("a").value);
    var b = parseFloat(document.getElementById("b").value);

    var wynik = a - b;
    document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
}
function iloczyn_sel(){
    if(!sprawdz_dane()) return;

    var a = parseFloat(document.getElementById("a").value);
    var b = parseFloat(document.getElementById("b").value);

    var wynik = a * b;
    document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
}
function iloraz_sel(){
    if(!sprawdz_dane()) return;
    var a = parseFloat(document.getElementById("a").value);
    var b = parseFloat(document.getElementById("b").value);

    if(b == 0){
        document.getElementById("wynik").innerHTML = "Nie wolno dzielić przez zero.";
        return;
    }
    var wynik = a / b;
    document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
}
</script>
</body>
</html>
<!-- Seliak Z40_JS -->

    </body>
