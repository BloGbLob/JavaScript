<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seliak Z39_JS</title>
</head>
<body>
<script>
var opcja_dana_sel = prompt("Podaj kolor (1 lub nazwa):");
if(opcja_dana_sel == "1" || opcja_dana_sel.toLowerCase() == "czerwony"){
    document.write("<h1 style='color:red;'>Wybrałeś czerwony</h1>");
}
else if(opcja_dana_sel == "2" || opcja_dana_sel.toLowerCase() == "niebieski"){
    document.write("<h2 style='color:blue;'>Wybrałeś niebieski</h2>");
}
else{
    document.write("Nieznany kolor");
}
</script>
</body>
</html>
