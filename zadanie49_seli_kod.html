    <hr>
    <div style="color:red;font-size:50px;"> 
        <script language="JavaScript"> 
            do { 
                var l1 = prompt("Podaj bok a=", ""); 
                var a_sel = parseFloat(l1); 
                var l2 = prompt("Podaj bok b=", ""); 
                var b_sel = parseFloat(l2); 
                var l3 = prompt("Podaj bok c=", ""); 
                var c_sel = parseFloat(l3); 
            } 
            while (!(a_sel>0 && b_sel>0 && c_sel>0 && a_sel+b_sel>c_sel && a_sel+c_sel>b_sel && b_sel+c_sel>a_sel)); 
            document.write("Podane boki tworzą trójkąt:<br>"); 
            document.write("a=" + a_sel + "<br>"); 
            document.write("b=" + b_sel + "<br>"); 
            document.write("c=" + c_sel + "<br>"); 
        </script> 
    </div> 
</body>
