<script language="JavaScript">
var imie_sel=prompt("Podaj imię=","");
var nazwisko_sel=prompt("Podaj nazwisko=","");
var a_sel=(nazwisko_sel.length%4)+5;
var b_sel=(imie_sel.length%6)+20;
document.write("a="+a_sel+"<br>");
document.write("b="+b_sel+"<br><br>");
for(var i_sel=1;i_sel<=b_sel;i_sel++){
document.write("*");
}
document.write("<br>");
for(var i_sel=1;i_sel<=a_sel-2;i_sel++){
document.write("*");
for(var j_sel=1;j_sel<=b_sel-2;j_sel++){
document.write("&nbsp;&nbsp;");
}
document.write("*<br>");
}
for(var i_sel=1;i_sel<=b_sel;i_sel++){
document.write("*");
}
</script>
