<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Zadanie 57 - Pavlo Seliak</title>
</head>
<body>
<h1>Zadanie 57</h1>
<p>Wykonał: Pavlo Seliak 3G2</p>
<hr>
<script language="JavaScript">
var l1_t_sel;
do{
l1_t_sel=parseInt(prompt("Podaj pierwszą liczbę z przedziału <20,60>=",""));
if(l1_t_sel<20||l1_t_sel>60){
alert("Liczba nie należy do przedziału <20,60>");
}
}while(l1_t_sel<20||l1_t_sel>60);
var l2_t_sel;
do{
l2_t_sel=parseInt(prompt("Podaj drugą liczbę z przedziału <20,60>=",""));
if(l2_t_sel<20||l2_t_sel>60){
alert("Liczba nie należy do przedziału <20,60>");
}
}while(l2_t_sel<20||l2_t_sel>60);
var pocz_sel=parseInt(prompt("Podaj początkową wielkość tekstu=",""));
var tekst_sel=prompt("Podaj dowolny tekst=","");
if(l1_t_sel<l2_t_sel){
for(var i_sel=pocz_sel;i_sel<=100;i_sel=i_sel+5){
document.write("<p style=\"font-size:"+i_sel+"px;\">"+tekst_sel+"</p>");
}
}
if(l1_t_sel>l2_t_sel){
for(var i_sel=pocz_sel;i_sel>=0;i_sel=i_sel-5){
document.write("<p style=\"font-size:"+i_sel+"px;\">"+tekst_sel+"</p>");
}
}
</script>
</body>
