<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 45 - Pavlo Seliak</title>
</head>
<body>
    <h1>Zadanie 45: Liczby parzyste</h1>
    <p>Wykonał: Pavlo Seliak 3G2</p>
    <hr>
    <script language="JavaScript">
        var koniec_petli_sel = prompt("Podaj liczbę końcową:");
        koniec_petli_sel = parseInt(koniec_petli_sel);
        document.write("Liczby parzyste od 2 do " + koniec_petli_sel + ":<br><br>");
        for (var i_sel = 2; i_sel <= koniec_petli_sel; i_sel += 2) 
        {
            document.write("Liczba: " + i_sel + " (Seliak)<br>");
        }
    </script>
</body>
</html>
