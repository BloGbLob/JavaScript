<body>
<h1>Zadanie 51</h1>
<p>Wykonał: Pavlo Seliak 3G2</p>
<hr>
<div style="color:red;font-size:50px;">
<script language="JavaScript">
do{
var n_sel=parseFloat(prompt("z czego silnia",""));
}while(n_sel<0);
var silnia_sel=1;
if(n_sel>0){
for(var i_sel=1;i_sel<=n_sel;i_sel++){
silnia_sel=silnia_sel*i_sel;
}
}
document.write(n_sel+"!="+silnia_sel);
</script>
</div>
<hr>
<input type="button" value="zamknij okno" onclick="window.close()"/>
</body>
